<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підтвердження | TalentPulse AI</title>
    <link rel="stylesheet" href="styles_v2.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .code-input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 0.5rem;
            margin: 2rem 0;
        }
        .code-input:focus {
            border-color: var(--primary);
            outline: none;
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="cursor-glow"></div>
    
    <div class="auth-container">
        <h1 class="gradient-text" style="font-size: 2rem;">Підтвердіть Акаунт</h1>
        <p style="color: var(--text-dim); margin-top: 1rem;">Ми надіслали 6-значний код на ваш Email або Телефон.</p>
        
        <form id="verify-form">
            <input type="text" id="verify-code" class="code-input" maxlength="6" placeholder="000000" required>
            <button type="submit" class="btn btn-primary btn-nav full-width" style="padding: 1rem;">Підтвердити</button>
        </form>
        
        <p id="msg" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--accent); display: none;"></p>
    </div>

    <script>
            const API_BASE_URL = 'https://zimburbels-talentpulse-api.hf.space/api';

        document.getElementById('verify-form').onsubmit = async (e) => {
            e.preventDefault();
            const code = document.getElementById('verify-code').value;
            const identifier = localStorage.getItem('verify_identifier');
            const msg = document.getElementById('msg');

            if (!identifier) {
                alert('Помилка: ідентифікатор не знайдено. Будь ласка, зареєструйтесь знову.');
                window.location.href = 'register.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, code })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('Акаунт успішно підтверджено! Тепер ви можете увійти.');
                    window.location.href = 'login.html';
                } else {
                    msg.innerText = data.detail || 'Невірний код';
                    msg.style.display = 'block';
                }
            } catch (err) {
                alert('Помилка з’єднання з сервером');
            }
        };
    </script>
</body>
</html>
