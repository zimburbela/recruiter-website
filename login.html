<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TalentPulse AI</title>
    <link rel="stylesheet" href="styles_v2.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-base);
        }
        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(20px);
        }
        .auth-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-dim); }
        .form-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-pure);
            font-family: inherit;
        }
        .form-input:focus { border-color: var(--primary); outline: none; }
        .auth-btn { width: 100%; padding: 1rem; margin-top: 1rem; }
        .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-dim); }
        .auth-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .social-auth { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); color: var(--text-pure); cursor: pointer; transition: all 0.3s; font-size: 0.9rem; }
        .social-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }
        .social-icon { width: 20px; height: 20px; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-dim); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--glass-border); }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
    </style>
</head>
<body>
    <div class="cursor-glow"></div>
    <div class="auth-wrapper">
        <div class="auth-card scroll-reveal revealed">
            <div style="text-align: center; margin-bottom: 1rem; font-size: 2rem;">⚡</div>
            <h1 class="auth-title">Вхід в <span class="gradient-text">TalentPulse</span></h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Email або Номер телефону</label>
                    <input type="text" id="username" class="form-input" placeholder="alex@example.com або +380..." required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Увійти</button>
            </form>

            <div class="divider">або через соціальні мережі</div>

            <div class="social-auth">
                <button class="social-btn" onclick="socialLogin('google')">
                    <img src="https://www.google.com/favicon.ico" class="social-icon" alt="Google">
                    Увійти через Google
                </button>
                <button class="social-btn" onclick="socialLogin('facebook')">
                    <img src="https://www.facebook.com/favicon.ico" class="social-icon" alt="Facebook">
                    Увійти через Facebook
                </button>
                <button class="social-btn" onclick="socialLogin('instagram')">
                    <img src="https://www.instagram.com/favicon.ico" class="social-icon" alt="Instagram">
                    Увійти через Instagram
                </button>
            </div>
            
            <div class="auth-footer">
                Немає акаунта? <a href="register.html" class="auth-link">Зареєструватись</a>
            </div>
        </div>
    </div>

    <script src="main_v2.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Using URLSearchParams for application/x-www-form-urlencoded
            const params = new URLSearchParams();
            params.append('username', username);
            params.append('password', password);

            try {
                const API_URL = 'https://zimburbels-talentpulse-api.hf.space/api/auth/login';
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });
                
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_role', data.role || 'recruiter');
                    // Redirect based on role
                    window.location.href = data.role === 'candidate' ? 'dashboard_candidate.html' : 'dashboard.html';
                } else {
                    console.error('Login error:', data);
                    alert(data.detail || 'Помилка входу. Перевірте логін та пароль.');
                }
            } catch (err) {
                console.error('Connection error:', err);
                alert('Неможливо з’єднатися з сервером (localhost:8000). Будь ласка, переконайтеся, що бекенд-сервер запущено.');
            }
        });

        async function socialLogin(provider) {
            alert(`Перенаправлення на ${provider}... (Імітація)`);
            setTimeout(() => {
                alert(`Успішний вхід через ${provider}!`);
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
