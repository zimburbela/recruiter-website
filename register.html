<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TalentPulse AI</title>
    <link rel="stylesheet" href="styles_v2.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Reusing styles from login.html */
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-base); }
        .auth-card { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 3rem; border-radius: 24px; width: 100%; max-width: 450px; backdrop-filter: blur(20px); }
        .auth-title { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-dim); }
        .form-input { width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-pure); font-family: inherit; }
        .form-input:focus { border-color: var(--primary); outline: none; }
        .auth-btn { width: 100%; padding: 1rem; margin-top: 1rem; }
        .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-dim); }
        .auth-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .social-auth { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); color: var(--text-pure); cursor: pointer; transition: all 0.3s; font-size: 0.9rem; }
        .social-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }
        .social-icon { width: 20px; height: 20px; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-dim); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--glass-border); }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
    </style>
</head>
<body>
    <div class="cursor-glow"></div>
    <div class="auth-wrapper">
        <div class="auth-card scroll-reveal revealed">
            <div style="text-align: center; margin-bottom: 1rem; font-size: 2rem;">🚀</div>
            <h1 class="auth-title">Створити <span class="gradient-text">Акаунт</span></h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname" class="form-label">Повне ім'я</label>
                    <input type="text" id="fullname" class="form-input" placeholder="Іван Іванов" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="alex@example.com">
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Або номер телефону</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+380 00 000 0000">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role" class="form-label">Ваша роль</label>
                    <select id="role" class="form-input" style="background: rgba(255, 255, 255, 0.05);">
                        <option value="recruiter">Я Рекрутер (шукаю людей)</option>
                        <option value="candidate">Я Кандидат (шукаю роботу)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-nav full-width auth-btn">Зареєструватись</button>
            </form>

            <div class="divider">або через соціальні мережі</div>

            <div class="social-auth">
                <button class="social-btn" onclick="socialLogin('google')">
                    <img src="https://www.google.com/favicon.ico" class="social-icon" alt="Google">
                    Реєстрація через Google
                </button>
                <button class="social-btn" onclick="socialLogin('facebook')">
                    <img src="https://www.facebook.com/favicon.ico" class="social-icon" alt="Facebook">
                    Реєстрація через Facebook
                </button>
                <button class="social-btn" onclick="socialLogin('instagram')">
                    <img src="https://www.instagram.com/favicon.ico" class="social-icon" alt="Instagram">
                    Реєстрація через Instagram
                </button>
            </div>
            
            <div class="auth-footer">
                Вже є акаунт? <a href="login.html" class="auth-link">Увійти</a>
            </div>
        </div>
    </div>

    <script src="main_v2.js"></script>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email && !phone) {
                alert('Будь ласка, вкажіть Email або Номер телефону');
                return;
            }

            try {
                const role = document.getElementById('role').value;
                const payload = { 
                    full_name: fullname, 
                    password: password, 
                    role: role 
                };
                if (email) payload.email = email;
                if (phone) payload.phone = phone;

                const API_URL = 'https://zimburbels-talentpulse-api.hf.space/api/auth/register';
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('verify_identifier', email || phone);
                    if (data.verification_code_sim) {
                        alert(`Реєстрація успішна! Ваш код підтвердження: ${data.verification_code_sim}`);
                    }
                    window.location.href = 'verify.html';
                } else {
                    console.error('Registration error:', data);
                    alert(data.detail || 'Помилка реєстрації. Можливо такий email вже існує.');
                }
            } catch (err) {
                console.error('Connection error:', err);
                alert('Неможливо з’єднатися з сервером (localhost:8000). Будь ласка, переконайтеся, що бекенд-сервер запущено.');
            }
        };

        async function socialLogin(provider) {
            alert(`Перенаправлення на ${provider}... (Імітація)`);
            // In a real app, you would redirect to OAuth provider URL
            // For demo, we simulate a successful login after 1 second
            setTimeout(() => {
                alert(`Успішний вхід через ${provider}! Ласкаво просимо.`);
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
